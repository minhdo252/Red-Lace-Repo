services:
  postgres:
    image: postgres:16-alpine
    container_name: aitravelmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aitravelmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aitravelmate}
      POSTGRES_DB: ${POSTGRES_DB:-aitravelmate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aitravelmate}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aitravelmate-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  adminer:
    image: adminer:latest
    container_name: aitravelmate-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
    container_name: aitravelmate-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-aitravelmate}:${POSTGRES_PASSWORD:-aitravelmate}@postgres:5432/${POSTGRES_DB:-aitravelmate}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
